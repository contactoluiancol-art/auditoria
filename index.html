<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Audit System - Login
  </title>

  <!-- ====================== -->
  <!-- CSS -->
  <!-- ====================== -->

  <link
    rel="stylesheet"
    href="css/styles.css"
  >

</head>





<!-- ====================== -->
<!-- BODY -->
<!-- ====================== -->

<body class="login-body">





  <!-- ====================== -->
  <!-- LOGIN CONTAINER -->
  <!-- ====================== -->

  <div class="login-container">




    <!-- ====================== -->
    <!-- LOGO -->
    <!-- ====================== -->

    <img

      src="img/logo-electro.png"

      class="logo"

      alt="Logo Electro Ingeniería"

    >





    <!-- ====================== -->
    <!-- TITULO -->
    <!-- ====================== -->

    <h1 class="login-title">

      Sistema Auditoría

    </h1>





    <!-- ====================== -->
    <!-- FORM -->
    <!-- ====================== -->

    <form id="loginForm">




      <!-- ====================== -->
      <!-- USUARIO -->
      <!-- ====================== -->

      <div class="input-group">

        <input

          type="text"

          id="usuario"

          placeholder="Ingrese usuario"

        >

      </div>





      <!-- ====================== -->
      <!-- PASSWORD -->
      <!-- ====================== -->

      <div class="input-group">

        <input

          type="password"

          id="password"

          placeholder="Ingrese contraseña"

        >

      </div>





      <!-- ====================== -->
      <!-- ROL -->
      <!-- ====================== -->

      <div class="input-group">

        <select id="rol">

          <option value="admin">

            Admin

          </option>

          <option value="lider">

            Líder

          </option>

          <option value="jefe">

            Jefe

          </option>

          <option value="auditor">

            Auditor

          </option>

        </select>

      </div>





      <!-- ====================== -->
      <!-- BOTON -->
      <!-- ====================== -->

      <button
        type="submit"
        class="btn-login"
      >

        Ingresar

      </button>

    </form>

  </div>





  <!-- ====================== -->
  <!-- SUPABASE -->
  <!-- ====================== -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>





  <!-- ====================== -->
  <!-- LOGIN JS -->
  <!-- ====================== -->

  <script src="js/login.js?v=5000"></script>

</body>

</html>
