<div class="module-container">

  <!-- HEADER -->

  <div class="module-header">

    <div>

      <h2>
        👥 Usuarios
      </h2>

      <p>
        Administración de usuarios y roles
      </p>

    </div>

  </div>





  <!-- FORM -->

  <div class="module-card">

    <h3>
      Crear Usuario
    </h3>





    <div class="form-grid">

      <!-- NOMBRE -->

      <div class="input-group">

        <label>
          Nombre
        </label>

        <input
          type="text"
          id="nombreUsuario"
          placeholder="Ingrese nombre"
        >

      </div>





      <!-- CORREO -->

      <div class="input-group">

        <label>
          Correo
        </label>

        <input
          type="email"
          id="correoUsuario"
          placeholder="Ingrese correo"
        >

      </div>





      <!-- ROL -->

      <div class="input-group">

        <label>
          Rol
        </label>

        <select id="rolUsuario">

          <option value="Administrador">
            Administrador
          </option>

          <option value="Auditor">
            Auditor
          </option>

          <option value="Lider">
            Líder
          </option>

          <option value="Jefe">
            Jefe
          </option>

        </select>

      </div>

    </div>





    <!-- BOTON -->

    <div class="button-group">

      <button
        id="guardarUsuario"
        class="btn-primary"
      >

        Guardar Usuario

      </button>

    </div>

  </div>





  <!-- TABLA -->

  <div class="module-card">

    <div class="table-header">

      <h3>
        Usuarios Registrados
      </h3>





      <input
        type="text"
        id="buscarUsuario"
        placeholder="Buscar usuario..."
        class="search-input"
      >

    </div>





    <div class="table-container">

      <table>

        <thead>

          <tr>

            <th style="width:35%;">
              Rol
            </th>

            <th style="width:25%;">
              Estado
            </th>

            <th style="width:40%;">
              Acciones
            </th>

          </tr>

        </thead>





        <tbody id="usuariosBody">

        </tbody>

      </table>

    </div>

  </div>

</div>
