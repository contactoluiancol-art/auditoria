<div class="module-container">

  <!-- HEADER -->

  <div class="module-header">

    <div>

      <h2>
        👥 Usuarios
      </h2>

      <p>
        Administración de usuarios y permisos
      </p>

    </div>

  </div>





  <!-- FORM -->

  <div class="module-card">

    <h3>
      Crear Usuario
    </h3>





    <div class="form-grid">

      <!-- USUARIO -->

      <div class="input-group">

        <label>
          Usuario
        </label>

        <input
          type="text"
          id="usuarioInput"
          placeholder="Ingrese usuario"
        >

      </div>





      <!-- PASSWORD -->

      <div class="input-group">

        <label>
          Contraseña
        </label>

        <input
          type="password"
          id="passwordInput"
          placeholder="Ingrese contraseña"
        >

      </div>





      <!-- ROL -->

      <div class="input-group">

        <label>
          Rol
        </label>

        <select id="rolUsuario">

          <option value="admin">
            admin
          </option>

          <option value="lider">
            lider
          </option>

          <option value="jefe">
            jefe
          </option>

          <option value="auditor">
            auditor
          </option>

          <option value="compras">
            compras
          </option>

        </select>

      </div>

    </div>





    <!-- ======================
    PERMISOS
    ====================== -->

    <div class="permisos-container">

      <h3 class="permisos-title">

        🔐 Permisos del Usuario

      </h3>





      <!-- INVENTARIO -->

      <div class="permiso-card">

        <h4>

          📦 Inventario

        </h4>





        <label>

          <input
            type="checkbox"
            id="inventarioVer"
          >

          Ver

        </label>





        <label>

          <input
            type="checkbox"
            id="inventarioCrear"
          >

          Crear

        </label>





        <label>

          <input
            type="checkbox"
            id="inventarioEditar"
          >

          Editar

        </label>





        <label>

          <input
            type="checkbox"
            id="inventarioEliminar"
          >

          Eliminar

        </label>

      </div>





      <!-- RECEPCION -->

      <div class="permiso-card">

        <h4>

          📥 Recepción

        </h4>





        <label>

          <input
            type="checkbox"
            id="recepcionVer"
          >

          Ver

        </label>





        <label>

          <input
            type="checkbox"
            id="recepcionCrear"
          >

          Crear

        </label>





        <label>

          <input
            type="checkbox"
            id="recepcionEditar"
          >

          Editar

        </label>





        <label>

          <input
            type="checkbox"
            id="recepcionEliminar"
          >

          Eliminar

        </label>

      </div>





      <!-- AUDITORIAS -->

      <div class="permiso-card">

        <h4>

          📋 Auditorías

        </h4>





        <label>

          <input
            type="checkbox"
            id="auditoriasVer"
          >

          Ver

        </label>





        <label>

          <input
            type="checkbox"
            id="auditoriasCrear"
          >

          Crear

        </label>





        <label>

          <input
            type="checkbox"
            id="auditoriasEditar"
          >

          Editar

        </label>





        <label>

          <input
            type="checkbox"
            id="auditoriasEliminar"
          >

          Eliminar

        </label>

      </div>





      <!-- USUARIOS -->

      <div class="permiso-card">

        <h4>

          👥 Usuarios

        </h4>





        <label>

          <input
            type="checkbox"
            id="usuariosVer"
          >

          Ver

        </label>





        <label>

          <input
            type="checkbox"
            id="usuariosCrear"
          >

          Crear

        </label>





        <label>

          <input
            type="checkbox"
            id="usuariosEditar"
          >

          Editar

        </label>





        <label>

          <input
            type="checkbox"
            id="usuariosEliminar"
          >

          Eliminar

        </label>

      </div>





      <!-- HISTORIAL -->

      <div class="permiso-card">

        <h4>

          🕓 Historial

        </h4>





        <label>

          <input
            type="checkbox"
            id="historialVer"
          >

          Ver

        </label>





        <label>

          <input
            type="checkbox"
            id="historialEliminar"
          >

          Eliminar

        </label>

      </div>

    </div>





    <!-- BOTON -->

    <div class="button-group">

      <button
        id="guardarUsuario"
        class="btn-primary"
      >

        Guardar Usuario

      </button>

    </div>

  </div>





  <!-- TABLA -->

  <div class="module-card">

    <div class="table-header">

      <h3>
        Usuarios Registrados
      </h3>





      <input
        type="text"
        id="buscarUsuario"
        placeholder="Buscar usuario..."
        class="search-input"
      >

    </div>





    <div class="table-container">

      <table>

        <thead>

          <tr>

            <th style="width:25%;">
              Usuario
            </th>

            <th style="width:20%;">
              Rol
            </th>

            <th style="width:20%;">
              Estado
            </th>

            <th style="width:35%;">
              Acciones
            </th>

          </tr>

        </thead>





        <tbody id="usuariosBody">

        </tbody>

      </table>

    </div>

  </div>

</div>
