<div class="module-container">

  <!-- HEADER -->

  <div class="module-header">

    <div>

      <h2>
        📥 Recepción
      </h2>

      <p>
        Control de recepción de mercancía
      </p>

    </div>

  </div>





  <!-- KPIS -->

  <div class="kpi-grid">

    <div class="kpi-card">

      <span>
        Recepciones
      </span>

      <h3 id="kpiRecepciones">
        0
      </h3>

    </div>





    <div class="kpi-card">

      <span>
        % Revisado
      </span>

      <h3 id="kpiRevisado">
        0%
      </h3>

    </div>





    <div class="kpi-card">

      <span>
        Novedades
      </span>

      <h3 id="kpiNovedades">
        0
      </h3>

    </div>





    <div class="kpi-card">

      <span>
        Faltantes
      </span>

      <h3 id="kpiFaltantes">
        0
      </h3>

    </div>

  </div>





  <!-- FORM -->

  <div class="module-card">

    <h3>
      Nueva Recepción
    </h3>





    <div class="form-grid">

      <div class="input-group">

        <label>
          Proveedor
        </label>

        <input
          type="text"
          id="proveedorInput"
          placeholder="Proveedor"
        >

      </div>





      <div class="input-group">

        <label>
          Material
        </label>

        <input
          type="text"
          id="materialInput"
          placeholder="Material"
        >

      </div>





      <div class="input-group">

        <label>
          Cantidad
        </label>

        <input
          type="number"
          id="cantidadInput"
          placeholder="Cantidad"
        >

      </div>





      <div class="input-group">

        <label>
          Revisadas
        </label>

        <input
          type="number"
          id="revisadasInput"
          placeholder="Revisadas"
        >

      </div>





      <div class="input-group">

        <label>
          Novedades
        </label>

        <input
          type="number"
          id="novedadesInput"
          placeholder="Novedades"
        >

      </div>





      <div class="input-group">

        <label>
          Faltantes
        </label>

        <input
          type="number"
          id="faltantesInput"
          placeholder="Faltantes"
        >

      </div>





      <div class="input-group">

        <label>
          Estado
        </label>

        <select id="estadoRecepcionInput">

          <option value="Pendiente">
            Pendiente
          </option>

          <option value="En revisión">
            En revisión
          </option>

          <option value="Novedad">
            Novedad
          </option>

          <option value="Revisado">
            Revisado
          </option>

        </select>

      </div>

    </div>





    <div class="input-group textarea-group">

      <label>
        Observación
      </label>

      <textarea
        id="observacionInput"
        placeholder="Ingrese observaciones"
      ></textarea>

    </div>





    <div class="button-group">

      <button
        id="guardarRecepcion"
        class="btn-primary"
      >

        Guardar Recepción

      </button>

    </div>

  </div>





  <!-- TABLA -->

  <div class="module-card">

    <div class="table-header">

      <h3>
        Recepciones Registradas
      </h3>

    </div>





    <div class="table-container">

      <table>

        <thead>

          <tr>

            <th>Proveedor</th>

            <th>Material</th>

            <th>Cantidad</th>

            <th>Revisadas</th>

            <th>%</th>

            <th>Novedades</th>

            <th>Estado</th>

            <th>Fecha</th>

            <th>Observación</th>

            <th>Acciones</th>

          </tr>

        </thead>





        <tbody id="recepcionesBody">

        </tbody>

      </table>

    </div>

  </div>

</div>
