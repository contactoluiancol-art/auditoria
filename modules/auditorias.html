<div class="module-container">

  <!-- HEADER -->

  <div class="module-header">

    <div>

      <h2>
        📋 Auditorías
      </h2>

      <p>
        Gestión y seguimiento de auditorías
      </p>

    </div>

  </div>





  <!-- FORM -->

  <div class="module-card">

    <h3>
      Nueva Auditoría
    </h3>





    <div class="form-grid">

      <div class="input-group">

        <label>
          Proceso
        </label>

        <input
          type="text"
          id="procesoInput"
          placeholder="Ingrese proceso"
        >

      </div>





      <div class="input-group">

        <label>
          Hallazgo
        </label>

        <input
          type="text"
          id="hallazgoInput"
          placeholder="Ingrese hallazgo"
        >

      </div>





      <div class="input-group">

        <label>
          Responsable
        </label>

        <input
          type="text"
          id="responsableInput"
          placeholder="Ingrese responsable"
        >

      </div>





      <div class="input-group">

        <label>
          Estado
        </label>

        <select id="estadoInput">

          <option value="Pendiente">
            Pendiente
          </option>

          <option value="En revisión">
            En revisión
          </option>

          <option value="Cerrado">
            Cerrado
          </option>

        </select>

      </div>

    </div>





    <div class="button-group">

      <button
        id="guardarAuditoria"
        class="btn-primary"
      >

        Guardar Auditoría

      </button>

    </div>

  </div>





  <!-- TABLA -->

  <div class="module-card">

    <div class="table-header">

      <h3>
        Auditorías Registradas
      </h3>

    </div>





    <div class="table-container">

      <table>

        <thead>

          <tr>

            <th>Proceso</th>

            <th>Hallazgo</th>

            <th>Responsable</th>

            <th>Estado</th>

            <th>Fecha</th>

            <th>Acciones</th>

          </tr>

        </thead>





        <tbody id="auditoriasBody">

        </tbody>

      </table>

    </div>

  </div>

</div>
