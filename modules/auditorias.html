<div class="auditorias-container">

  <h1 class="titulo-modulo">
    Módulo Auditorías
  </h1>

<link rel="stylesheet" href="css/auditorias.css">

  <!-- FORMULARIO -->

  <div class="auditoria-form">

    <div class="form-group">

      <label>
        Proceso
      </label>

      <input
        type="text"
        id="procesoInput"
        placeholder="Ej: Recepción"
      >

    </div>
     


    <div class="form-group">

      <label>
        Hallazgo
      </label>

      <textarea
        id="hallazgoInput"
        placeholder="Describe el hallazgo"
      ></textarea>

    </div>


    <div class="form-group">

      <label>
        Responsable
      </label>

      <input
        type="text"
        id="responsableInput"
        placeholder="Responsable"
      >

    </div>


    <div class="form-group">

      <label>
        Estado
      </label>

      <select id="estadoInput">

        <option value="Pendiente">
          Pendiente
        </option>

        <option value="En revisión">
          En revisión
        </option>

        <option value="Cerrado">
          Cerrado
        </option>

      </select>
  <button id="guardarAuditoria">
      Guardar auditoría
    </button>
    </div>


 

  </div>


  <!-- HISTORIAL -->

  <div class="tabla-auditorias">

    <table>

      <thead>

        <tr>

          <th>Proceso</th>

          <th>Hallazgo</th>

          <th>Responsable</th>

          <th>Estado</th>

          <th>Fecha</th>

          <th>Acciones</th>

        </tr>

      </thead>

      <tbody id="auditoriasBody">

      </tbody>

    </table>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
