<div class="module-container">

  <!-- HEADER -->

  <div class="module-header">

    <div>

      <h2>
        🕓 Historial
      </h2>

      <p>
        Seguimiento de movimientos y acciones del sistema
      </p>

    </div>

  </div>





  <!-- KPIS -->

  <div class="kpi-grid">

    <div class="kpi-card">

      <span>
        Total Registros
      </span>

      <h3 id="kpiHistorial">
        0
      </h3>

    </div>





    <div class="kpi-card">

      <span>
        Inventario
      </span>

      <h3 id="kpiInventario">
        0
      </h3>

    </div>





    <div class="kpi-card">

      <span>
        Auditorías
      </span>

      <h3 id="kpiAuditorias">
        0
      </h3>

    </div>





    <div class="kpi-card">

      <span>
        Recepción
      </span>

      <h3 id="kpiRecepcion">
        0
      </h3>

    </div>

  </div>





  <!-- TABLA -->

  <div class="module-card">

    <div class="table-header">

      <h3>
        Movimientos del Sistema
      </h3>





      <input
        type="text"
        id="buscarHistorial"
        placeholder="Buscar movimiento..."
        class="search-input"
      >

    </div>





    <div class="table-container">

      <table>

        <thead>

          <tr>

            <th>Usuario</th>

            <th>Módulo</th>

            <th>Acción</th>

            <th>Detalle</th>

            <th>Fecha</th>

          </tr>

        </thead>





        <tbody id="historialBody">

        </tbody>

      </table>

    </div>

  </div>

</div>
