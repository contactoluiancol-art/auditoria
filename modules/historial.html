<div class="module-container">

  <!-- HEADER -->

  <div class="module-header">

    <div>

      <h2>
        🕓 Historial
      </h2>

      <p>

      </p>

    </div>

  </div>





  <!-- KPIS -->

  <div class="kpi-grid">

    <div class="kpi-card">

      <span>
        Total Registros
      </span>

      </h3>

    </div>





    <div class="kpi-card">

      <span>
        Inventario
      </span>

        0

    </div>





    <div class="kpi-card">

      <span>
        Auditorías
      </span>

      <h3 id="kpiAuditorias">
        0
      </h3>

    </div>





    <div class="kpi-card">

      <span>
        Recepción
      </span>

      <h3 id="kpiRecepcion">

    </div>

  </div>





  <!-- TABLA -->

  <div class="module-card">

    <div class="table-header">

      <div style="display:flex;align-items:center;gap:10px;">

  <h3>
    Movimientos del Sistema
  </h3>





  <button
    class="btn-eliminar"
    onclick="eliminarTodoHistorial()"

    Eliminar Todo

  </button>

</div>




      <input
        type="text"
        id="buscarHistorial"
        placeholder="Buscar movimiento..."

      >

    </div>





    <div class="table-container">

        <thead>

  <tr>

    <th style="width:12%;">
      Usuario
    </th>

    <th style="width:12%;">
      Módulo
    </th>

    <th style="width:12%;">
      Acción
    </th>

    <th style="width:42%;">
      Detalle
    </th>

    <th style="width:14%;">
      Fecha
    </th>

    <th style="width:8%;">
      Acciones
    </th>

  </tr>

</thead>




        <tbody id="historialBody">

        </tbody>

      </table>

    </div>

  </div>
