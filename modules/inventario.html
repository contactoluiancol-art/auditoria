<!-- INVENTARIO -->

<div class="module-card">

  <div class="table-header">

    <h3>
      Inventario
    </h3>



    <div class="button-group">

      <!-- BOTON CARGAR EXCEL -->

      <button
        class="btn-primary"
        onclick="document.getElementById('excelFile').click()"
      >

        📂 Cargar Excel

      </button>



      <!-- BUSCADOR -->

      <input
        type="text"
        id="buscadorInventario"
        placeholder="Buscar producto..."
        class="search-input"
      >

    </div>

  </div>



  <div class="table-container">

    <table>

      <thead>

        <tr>

          <th>Código</th>

          <th>Producto</th>

          <th>Ubicación</th>

          <th>Stock</th>

        </tr>

      </thead>



      <tbody id="inventarioBody">

      </tbody>

    </table>

  </div>

</div>

<!-- EXCEL -->

<input
  type="file"
  id="excelFile"
  accept=".xlsx,.xls"
  hidden
>
